    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --blur: blur(16px);
            --accent-yellow: #facc15;
            --accent-blue: #3b82f6;
            --accent-pink: #ec4899;
            --accent-green: #22c55e;
            --accent-purple: #a855f7;
            --container: 1280px;
            --radius: 16px;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #f8fafc;
                --bg-secondary: #ffffff;
                --text-primary: #0f172a;
                --text-secondary: #475569;
                --glass-bg: rgba(255, 255, 255, 0.7);
                --glass-border: rgba(0, 0, 0, 0.06);
                --glass-highlight: rgba(255, 255, 255, 0.9);
                --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; direction: rtl; }
        body {
            font-family: 'Sahel', 'Sahel-FD', Tahoma, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .ambient-orb {
            position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.4; pointer-events: none;
        }
        .orb-1 { top: -10%; right: -5%; width: 600px; height: 600px; background: var(--accent-blue); }
        .orb-2 { bottom: 10%; left: -10%; width: 700px; height: 700px; background: var(--accent-purple); }
        .orb-3 { top: 40%; right: 20%; width: 400px; height: 400px; background: var(--accent-yellow); opacity: 0.15; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--glass-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
            border-color: var(--glass-highlight);
        }

        .ico { width: 20px; height: 20px; flex-shrink: 0; display: inline-block; vertical-align: middle; }
        .ico-sm { width: 18px; height: 18px; }

        /* --- Popup --- */
        .popup-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px);
            z-index: 100005; display: flex; align-items: center; justify-content: center; padding: 1.5rem; animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .popup-content {
            background: var(--bg-secondary); border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); padding: 2.5rem 2rem;
            max-width: 480px; width: 100%; text-align: center; position: relative;
            border-radius: var(--radius); animation: popIn 0.5s cubic-bezier(0.2, 0.9, 0.2, 1) both;
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .popup-close {
            position: absolute; top: 16px; left: 16px; width: 36px; height: 36px;
            background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .popup-close:hover { background: #ef4444; color: #fff; transform: rotate(90deg); }
        .popup-icon { font-size: 3rem; margin-bottom: 1rem; display: inline-block; animation: softFloat 3s ease-in-out infinite; }
        .popup-title { font-size: 1.6rem; font-weight: 900; margin-bottom: 1rem; color: var(--text-primary); }
        .popup-text { font-size: 1.1rem; font-weight: 600; line-height: 1.8; margin-bottom: 2rem; color: var(--text-secondary); }
        .popup-text strong { color: var(--accent-yellow); }
        .popup-btn {
            width: 100%; justify-content: center; font-size: 1.1rem; padding: 1rem 1.5rem;
            background: var(--accent-blue); color: #fff; border: none; border-radius: 12px;
            font-weight: 800; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex;
        }
        .popup-btn:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); }

        /* --- Hero Section --- */
        #hero { position: relative; padding: 8rem 2rem 5rem; overflow: hidden; }
        .hero-inner {
            max-width: var(--container); margin: 0 auto;
            display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 4rem; align-items: center;
        }
        .hero-brand {
            display: block;
            font-size: clamp(4rem, 9vw, 6.5rem); font-weight: 900;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem; letter-spacing: -2px; line-height: 1.1;
        }
        .hero-name {
            display: block;
            font-size: 1.8rem; font-weight: 800;
            color: var(--accent-yellow); margin-bottom: 1.2rem;
        }
        .hero-eyebrow {
            display: flex;
            width: fit-content;
            align-items: flex-start; gap: 0.75rem;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 0.85rem 1.3rem; border-radius: 12px;
            font-weight: 700; font-size: 1rem; color: var(--text-primary);
            margin-bottom: 1.8rem; backdrop-filter: var(--blur);
        }
        .live-dot {
            width: 10px; height: 10px; background: var(--accent-green);
            border-radius: 50%; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2);
            animation: pulse 2s infinite; flex-shrink: 0; margin-top: 6px;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }
        
        .hero-badges { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 2rem; }
        .hero-badges span {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 0.5rem 1rem; border-radius: 8px; font-weight: 700; font-size: 0.95rem;
            color: var(--text-primary); transition: all 0.2s;
        }
        .hero-badges span:hover { background: var(--glass-highlight); transform: translateY(-2px); }
        
        .hero-ctas { display: flex; flex-wrap: wrap; gap: 1rem; }
        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            font-weight: 800; font-size: 1.05rem; padding: 0.9rem 1.8rem;
            border-radius: 12px; text-decoration: none; transition: all 0.2s; cursor: pointer;
        }
        .btn-primary {
            background: var(--accent-yellow); color: #0f172a;
            box-shadow: 0 4px 15px -3px rgba(250, 204, 21, 0.4);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(250, 204, 21, 0.5); }
        .btn-ghost {
            background: var(--glass-bg); color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }
        .btn-ghost:hover { background: var(--glass-highlight); transform: translateY(-2px); }

        .hero-visual { position: relative; min-height: 520px; perspective: 1000px; }
        .hv-browser {
            background: var(--bg-secondary); border: 1px solid var(--glass-border);
            border-radius: 16px; overflow: visible;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: rotateY(-5deg) rotateX(5deg);
            transition: transform 0.5s ease;
            animation: softFloat 6s ease-in-out infinite;
            display: flex; flex-direction: column; gap: 1rem;
        }
        .hero-visual:hover .hv-browser { transform: rotateY(0) rotateX(0); }
        
        .hv-terminal, .hv-ui-card {
            background: var(--bg-secondary); border: 1px solid var(--glass-border);
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .hv-browser-top {
            background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--glass-border);
            padding: 0.7rem 1rem; display: flex; gap: 0.5rem; align-items: center;
            font-weight: 700; font-size: 0.8rem; color: var(--text-secondary);
        }
        .hv-dots { display: flex; gap: 6px; }
        .hv-dots i { width: 10px; height: 10px; border-radius: 50%; display: block; }
        .hv-dots i:nth-child(1) { background: #ef4444; }
        .hv-dots i:nth-child(2) { background: #facc15; }
        .hv-dots i:nth-child(3) { background: #22c55e; }
        
        .hv-code-block {
            font-family: 'Courier New', monospace; font-size: 0.85rem; line-height: 1.6;
            padding: 1rem; direction: ltr; text-align: left;
        }
        .code-tag { color: var(--accent-pink); }
        .code-attr { color: var(--accent-yellow); }
        .code-string { color: var(--accent-green); }
        .code-comment { color: #64748b; font-style: italic; }
        
        .hv-ui-header {
            padding: 0.8rem 1rem; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border); font-weight: 700; font-size: 0.85rem;
        }
        .hv-ui-badge {
            background: rgba(34, 197, 94, 0.15); color: var(--accent-green);
            padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.75rem; font-weight: 800;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        
        .hv-seo-metrics {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; padding: 1rem;
        }
        .hv-metric-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            border-radius: 8px; padding: 0.6rem; display: flex; flex-direction: column; gap: 0.2rem;
        }
        .hv-metric-label { font-size: 0.7rem; color: var(--text-secondary); font-weight: 600; }
        .hv-metric-value { font-size: 1.1rem; font-weight: 800; }
        .hv-metric-value.good { color: var(--accent-green); }
        .hv-metric-value.highlight { color: var(--accent-yellow); }
        .hv-metric-value.pass { color: var(--accent-blue); }

        .hv-tech-badges { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
        .hv-badge {
            padding: 0.3rem 0.8rem; border-radius: 6px; font-size: 0.75rem; font-weight: 800;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(4px);
        }
        .hv-badge.html { background: rgba(228, 77, 38, 0.15); color: #e44d26; border-color: rgba(228, 77, 38, 0.3); }
        .hv-badge.css { background: rgba(38, 77, 228, 0.15); color: #264de4; border-color: rgba(38, 77, 228, 0.3); }
        .hv-badge.js { background: rgba(240, 219, 79, 0.15); color: #f0db4f; border-color: rgba(240, 219, 79, 0.3); }
        .hv-badge.react { background: rgba(97, 218, 251, 0.15); color: #61dafb; border-color: rgba(97, 218, 251, 0.3); }

        /* --- Capabilities Section --- */
        .capabilities-intro { text-align: center; max-width: 900px; margin: 0 auto 3rem; }
        .capabilities-intro h3 { font-size: 1.5rem; font-weight: 800; color: var(--accent-yellow); margin-bottom: 1rem; }
        .capabilities-intro-text {
            font-size: 1.2rem; color: var(--text-secondary); line-height: 1.8; font-weight: 500;
        }

        .capabilities-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.25rem; max-width: var(--container); margin: 0 auto;
        }
        .cap-item {
            padding: 1.5rem; display: flex; align-items: center; gap: 1rem;
            font-weight: 700; font-size: 1.05rem; color: var(--text-primary);
        }
        .cap-icon {
            width: 40px; height: 40px; min-width: 40px; border-radius: 10px;
            background: rgba(59, 130, 246, 0.1); color: var(--accent-blue);
            display: flex; align-items: center; justify-content: center;
        }

        /* --- Sections General --- */
        .section { padding: 6rem 2rem; position: relative; }
        .section-title {
            font-size: 2.5rem; font-weight: 900; text-align: center;
            margin-bottom: 3.5rem; letter-spacing: -1px; color: var(--text-primary);
        }
        .section-title::after {
            content: ''; display: block; width: 60px; height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            margin: 1rem auto 0; border-radius: 2px;
        }

        /* --- Carousel --- */
        .carousel-desktop-grid { display: grid; gap: 1.5rem; max-width: var(--container); margin: 0 auto; }
        #design-plans .carousel-desktop-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        #seo-plans .carousel-desktop-grid { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
        #testimonials .carousel-desktop-grid { grid-template-columns: repeat(3, 1fr); }
        
        .carousel-mobile-stage { position: relative; max-width: var(--container); margin: 0 auto; overflow: hidden; padding-bottom: 3rem; }
        .carousel-track-container { width: 100%; overflow: visible; cursor: grab; padding: 10px 0 20px; }
        .carousel-track-container:active { cursor: grabbing; }
        .carousel-track { display: flex; direction: ltr; will-change: transform; }
        .carousel-slide { min-width: 100%; width: 100%; flex-shrink: 0; padding: 0 12px; direction: rtl; }
        
        .carousel-controls { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-top: 1.5rem; }
        .carousel-btn {
            display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.2rem;
            border: 1px solid var(--glass-border); background: var(--glass-bg);
            color: var(--text-primary); font-weight: 700; border-radius: 8px; cursor: pointer;
            backdrop-filter: var(--blur); transition: all 0.2s;
        }
        .carousel-btn:hover { background: var(--glass-highlight); }
        .carousel-counter { font-weight: 700; font-size: 0.9rem; color: var(--text-secondary); }
        .carousel-dots { display: flex; justify-content: center; gap: 0.6rem; margin-top: 1.5rem; }
        .carousel-dot {
            width: 12px; height: 12px; border: none; background: var(--glass-border);
            border-radius: 50%; cursor: pointer; transition: all 0.2s; padding: 0;
        }
        .carousel-dot.active { background: var(--accent-yellow); transform: scale(1.3); }

        /* --- Plan Cards --- */
        .plan-card { padding: 2rem 1.5rem; display: flex; flex-direction: column; height: 100%; position: relative; overflow: hidden; }
        .plan-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
        }
        .plan-card--green::before { background: var(--accent-green); }
        .plan-card--red::before { background: var(--accent-pink); }
        .plan-card--highlighted { background: rgba(250, 204, 21, 0.05); border-color: rgba(250, 204, 21, 0.2); }
        
        .plan-head-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .plan-num {
            width: 44px; height: 44px; min-width: 44px;
            border: 1px solid var(--glass-border); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1rem; background: var(--glass-bg);
        }
        .plan-name { font-size: 1.2rem; font-weight: 800; line-height: 1.4; color: var(--text-primary); }
        .plan-meta { display: flex; flex-wrap: wrap; gap: 0.75rem; margin: 1rem 0; }
        .plan-price-box {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: rgba(250, 204, 21, 0.1); border: 1px solid rgba(250, 204, 21, 0.2);
            padding: 0.4rem 0.8rem; border-radius: 8px; font-weight: 800; font-size: 0.95rem; color: var(--accent-yellow);
        }
        .plan-time-box {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 0.4rem 0.8rem; border-radius: 8px; font-weight: 700; font-size: 0.85rem; color: var(--text-secondary);
        }
        .plan-suitable {
            font-weight: 600; border: 1px dashed var(--glass-border);
            background: rgba(255,255,255,0.02); text-align: center;
            padding: 0.75rem; margin-bottom: 1.5rem; font-size: 0.95rem; color: var(--text-secondary); border-radius: 8px;
        }
        .plan-features { list-style: none; flex-grow: 1; margin-bottom: 1.5rem; }
        .plan-features li {
            margin-bottom: 0.7rem; font-weight: 600; font-size: 0.95rem; line-height: 1.6;
            padding-right: 1.5rem; position: relative; color: var(--text-secondary);
        }
        .plan-features li strong { color: var(--text-primary); background: rgba(255,255,255,0.05); padding: 0.1rem 0.4rem; border-radius: 4px; }
        .plan-features li::before {
            content: "✓"; position: absolute; right: 0; top: 0;
            color: var(--accent-green); font-weight: 900; font-size: 0.9rem;
        }
        .plan-revisions {
            border-top: 1px solid var(--glass-border);
            margin: 0 -1.5rem -2rem -1.5rem; padding: 1rem 1.5rem;
            background: rgba(0,0,0,0.2);
        }
        .plan-revisions-title {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: var(--text-primary); color: var(--bg-primary);

        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; max-width: var(--container); margin: 0 auto; }
        .project-link {

        .project-link:hover { background: var(--glass-highlight); }
        .projects-note {
            max-width: 800px; margin: 2.5rem auto 0; padding: 1.5rem;
            border: 1px dashed var(--glass-border); background: var(--glass-bg);
            text-align: center; font-weight: 600; font-size: 1rem; color: var(--text-secondary); border-radius: var(--radius);

        /* --- Terms --- */
        .terms-grid { display: grid; gap: 1.5rem; max-width: var(--container); margin: 0 auto; }
        .term-item { padding: 1.5rem; height: 100%; }
        .term-item h4 {
            font-weight: 800; font-size: 1.2rem; margin-bottom: 1rem;
            display: inline-block; color: var(--accent-pink);
            padding: 0.2rem 0.8rem; background: rgba(236, 72, 153, 0.1);
            border-radius: 6px; border: 1px solid rgba(236, 72, 153, 0.2);
        }
        .term-item ul { list-style: none; }
        .term-item ul li {
            margin-bottom: 0.6rem; font-weight: 600; font-size: 0.95rem;
            padding-right: 1.25rem; position: relative; color: var(--text-secondary);
        }
        .term-item ul li::before {
            content: ""; position: absolute; right: 0; top: 0.6rem;
            width: 6px; height: 6px; background: var(--accent-purple); border-radius: 50%;

        /* --- Domains --- */
        .domains-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 1.25rem; max-width: var(--container); margin: 0 auto;

        .domain-card {
            padding: 1.5rem; text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;

        .domain-name {
            font-size: 1.2rem; font-weight: 800; color: var(--accent-yellow);
            font-family: monospace; letter-spacing: 0.5px; direction: ltr;

        /* --- Testimonials --- */
        .testimonial-card { padding: 2rem; position: relative; height: 100%; display: flex; flex-direction: column; }
        .testimonial-text {
            font-size: 1.05rem; line-height: 1.8; color: var(--text-secondary);
            margin-bottom: 1.5rem; font-style: italic; flex-grow: 1;

        .testimonial-author { display: flex; align-items: center; gap: 1rem; margin-top: auto; }
        .testimonial-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #fff; font-size: 1.2rem;
        }
        .testimonial-info h5 { font-weight: 800; color: var(--text-primary); font-size: 1.05rem; }
        .testimonial-info span { font-size: 0.9rem; color: var(--text-secondary); }

        /* --- Design Styles --- */
        .styles-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.25rem; max-width: var(--container); margin: 0 auto;

        }
        .footer-grid-bg {
            position: absolute; inset: 0;

            pointer-events: none; z-index: 0;
        }
        .footer-orb {
            position: absolute; bottom: -50px; right: 10%;
            width: 200px; height: 200px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(250, 204, 21, 0.3), rgba(236, 72, 153, 0.2));
            filter: blur(40px); pointer-events: none;

        .footer-inner {

            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 0.2rem; letter-spacing: -1px;
            text-shadow: 0 0 30px rgba(250, 204, 21, 0.3);
        }
        .footer-desc {
            max-width: 600px; font-size: 1.05rem; line-height: 1.8; color: var(--text-secondary);
        }
        .footer-divider {
            width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
            margin: 0.5rem 0;
        }
        .footer-bottom {
            position: relative; z-index: 1;
            width: 100%; max-width: var(--container); margin: 0 auto; padding: 1rem 2rem 1.5rem;
            display: flex; align-items: center; justify-content: space-between; gap: 1rem;
            font-weight: 600; font-size: 0.9rem; color: var(--text-secondary);
        }
        .back-top {
            display: inline-flex; align-items: center; gap: 0.5rem;

        .back-top:hover { 
            background: var(--accent-yellow); color: #0f172a; border-color: var(--accent-yellow); 
            transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(250, 204, 21, 0.3);
        }

        @keyframes softFloat { 0%, 100% { transform: translateY(0) rotateX(15deg); } 50% { transform: translateY(-15px) rotateX(15deg); } }
        
        .motion-reveal { 
            opacity: 0; 
            transform: translateY(30px); 
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.2, 0.9, 0.2, 1); 
            will-change: transform, opacity;
        }
        .motion-reveal.is-visible { 
            opacity: 1; 
            transform: translateY(0); 
        }

        /* --- Responsive --- */
        @media (min-width: 1201px) {
            #design-terms .terms-grid { grid-template-columns: repeat(3, 1fr); }

        @media (max-width: 480px) {
            .domains-grid { grid-template-columns: 1fr; }
            #seo-terms .terms-grid { grid-template-columns: 1fr; }
        }
        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
            .motion-reveal { opacity: 1; transform: none; }
        }
    </style>
</head>
<body>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>
    
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useRef, useCallback, useEffect } = React;

        function PonishaPopup({ isOpen, onClose }) {
            if (!isOpen) return null;
            return (
                <div className="popup-overlay" onClick={onClose}>
                    <div className="popup-content" onClick={(e) => e.stopPropagation()}>
                        <button className="popup-close" onClick={onClose} aria-label="بستن پاپ‌آپ">
                            <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" d="M18 6L6 18M6 6l12 12" />
                            </svg>
                        </button>
                        <div className="popup-icon">🚀</div>
                        <h3 className="popup-title">شروع همکاری</h3>
                        <p className="popup-text">
                            برای ارتباط و شروع پروژه، <strong>حتماً</strong> از طریق پلتفرم <strong>پونیشا</strong> اقدام کنید.
                        </p>
                        <a href="https://ponisha.ir/profile/reallpha" target="_blank" rel="noopener noreferrer" className="btn popup-btn">
                            رفتن به پروفایل پونیشا
                            <svg className="ico" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24" style={{marginLeft: '8px'}}>
                                <path strokeLinecap="round" strokeLinejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                            </svg>
                        </a>
                    </div>
                </div>
            );
        }

        function Carousel({ children, breakpoint = 1024, showArrows = true }) {
            const items = React.Children.toArray(children);
            const total = items.length;
            const [curr, setCurr] = useState(0);
            const [isMobile, setIsMobile] = useState(false);
            const isDragging = useRef(false);
            const startX = useRef(0);
            const currentDragX = useRef(0);
            const [dragOffset, setDragOffset] = useState(0);

            useEffect(() => {
                const checkMobile = () => setIsMobile(window.innerWidth <= breakpoint);
                checkMobile();
                window.addEventListener('resize', checkMobile);
                return () => window.removeEventListener('resize', checkMobile);
            }, [breakpoint]);

            const nextSlide = useCallback(() => { setCurr(p => (p + 1) % total); setDragOffset(0); }, [total]);
            const prevSlide = useCallback(() => { setCurr(p => (p - 1 + total) % total); setDragOffset(0); }, [total]);
            const goTo = useCallback(i => { setCurr(i); setDragOffset(0); }, []);

            const handleTouchStart = e => { isDragging.current = true; startX.current = e.touches[0].clientX; currentDragX.current = e.touches[0].clientX; };
            const handleTouchMove = e => { if (!isDragging.current) return; currentDragX.current = e.touches[0].clientX; setDragOffset(currentDragX.current - startX.current); };
            const handleTouchEnd = () => {
                if (!isDragging.current) return; isDragging.current = false;
                const d = currentDragX.current - startX.current;
                if (d < -40) nextSlide(); else if (d > 40) prevSlide(); else setDragOffset(0);
            };
            const handleMouseDown = e => { isDragging.current = true; startX.current = e.clientX; currentDragX.current = e.clientX; };
            const handleMouseMove = e => { if (!isDragging.current) return; currentDragX.current = e.clientX; setDragOffset(currentDragX.current - startX.current); };
            const handleMouseUpOrLeave = () => {
                if (!isDragging.current) return; isDragging.current = false;
                const d = currentDragX.current - startX.current;
                if (d < -40) nextSlide(); else if (d > 40) prevSlide(); else setDragOffset(0);
            };

            if (!isMobile) return <div className="carousel-desktop-grid">{children}</div>;

            const translateX = `calc(-${curr * 100}% + ${dragOffset}px)`;
            return (
                <div className="carousel-mobile-stage" role="region" aria-roledescription="carousel" aria-label="اسلایدر">
                    <div className="carousel-track-container" 
                         onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd} 
                         onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUpOrLeave} onMouseLeave={handleMouseUpOrLeave}>
                        <div className="carousel-track" style={{ transform: `translate3d(${translateX}, 0, 0)`, transition: isDragging.current ? 'none' : 'transform 0.38s cubic-bezier(0.25, 1, 0.5, 1)' }}>
                            {items.map((child, i) => (
                                <div className="carousel-slide" key={i} role="group" aria-roledescription="slide" aria-label={`${i + 1} از ${total}`}>
                                    {child}
                                </div>
                            ))}
                        </div>
                    </div>
                    {showArrows && (
                        <div className="carousel-controls">
                            <button type="button" className="carousel-btn" onClick={prevSlide} title="قبلی" aria-label="اسلاید قبلی">
                                <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/></svg>
                            </button>
                            <div className="carousel-counter" aria-live="polite">{curr + 1} / {total}</div>
                            <button type="button" className="carousel-btn" onClick={nextSlide} title="بعدی" aria-label="اسلاید بعدی">
                                <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
                            </button>
                        </div>
                    )}
                    <div className="carousel-dots" role="tablist">
                        {Array.from({ length: total }).map((_, i) => (
                            <button key={i} type="button" className={`carousel-dot ${i === curr ? 'active' : ''}`} 
                                    onClick={() => goTo(i)} role="tab" aria-selected={i === curr} aria-label={`رفتن به اسلاید ${i + 1}`} />
                        ))}
                    </div>
                </div>
            );
        }

        function PlanChipList({ title, items }) {
            return (
                <div className="plan-revisions">
                    <div className="plan-revisions-title">{title}</div>
                    <div className="plan-revisions-list">
                        {items.map((text, i) => (<span key={i} className="plan-revisions-chip">{text}</span>))}
                    </div>
                </div>
            );
        }

        const IconMoney = () => (<svg className="ico ico-sm" fill="none" stroke="currentColor" strokeWidth="2.4" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1"/></svg>);
        const IconClock = () => (<svg className="ico ico-sm" fill="none" stroke="currentColor" strokeWidth="2.2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path strokeLinecap="round" d="M12 7v5l3 3"/></svg>);
        const IconCal = () => (<svg className="ico ico-sm" fill="none" stroke="currentColor" strokeWidth="2.2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>);
        const IconExt = () => (<svg className="ico" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>);
        const IconCheck = () => (<svg className="ico" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>);

        function App() {
            const [isPopupOpen, setIsPopupOpen] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => setIsPopupOpen(true), 8500);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => {
                const targets = document.querySelectorAll('.section, .plan-card, .term-item, .cap-item, .style-item, .project-link, .domain-card, .testimonial-card');
                if (!('IntersectionObserver' in window)) {
                    targets.forEach(el => el.classList.add('is-visible'));
                    return;
                }
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('is-visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1, rootMargin: '0px 0px -5% 0px' });
                targets.forEach((el, index) => {
                    el.classList.add('motion-reveal');
                    el.style.transitionDelay = Math.min((index % 5) * 100, 400) + 'ms';
                    observer.observe(el);
                });
                return () => observer.disconnect();
            }, []);

            const capabilities = [
                "توسعه وب‌سایت سفارشی", "اپلیکیشن و PWA", "ایجنت هوشمند", "ربات تلگرامی",
                "اتوماسیون فرایندها", "اتصال API و وب‌هوک", "پنل مدیریت اختصاصی", "داشبورد داده و گزارش"
            ];

            const designStyles = [
                { title: "Glassmorphism", desc: "شیشه‌ای، Blur، شفافیت و عمق بصری" },
                { title: "Neumorphism / Soft UI", desc: "برجستگی و فرورفتگی نرم و مینیمال" },
                { title: "Brutalism", desc: "خشن، خام، تایپوگرافی بزرگ و متفاوت" },
                { title: "Neobrutalism", desc: "نسخه مدرن‌تر، رنگی‌تر و جذاب‌تر Brutalism" },
                { title: "Claymorphism", desc: "المان‌های نرم، دوست‌داشتنی و سه‌بعدی شبیه خمیر" },
                { title: "Bento UI / Bento Grid", desc: "کارت‌بندی شبکه‌ای، ماژولار و بسیار ترند" },
                { title: "Aurora UI", desc: "گرادیان‌های نورانی، رنگ‌های پخش‌شده و رویایی" },
                { title: "Minimalism", desc: "ساده، خلوت و با تمرکز کامل روی محتوا و کاربر" },
                { title: "Dark Mode / Dark UI", desc: "رابط کاربری تاریک، حرفه‌ای و خسته‌نشدنی" },
                { title: "Cyberpunk / Futuristic", desc: "نئونی، تکنولوژیک، آینده‌نگر و پرانرژی" },
                { title: "Retro / Vintage UI", desc: "الهام‌گرفته از دهه‌های گذشته، نوستالژیک و با شخصیت" },
                { title: "3D / Immersive UI", desc: "استفاده از المان‌های سه‌بعدی و تعاملی برای غوطه‌وری کاربر" }
            ];

            const testimonials = [
                { name: "علی محمدی", role: "مدیرعامل استارتاپ زرپی", text: "همکاری با محمدرضا تجربه‌ای فوق‌العاده بود. تسلط ایشان بر سئو و فرانت‌اند باعث شد سرعت سایت ما ۳ برابر شود و ورودی گوگل در ۳ ماه اول، ۱۵۰٪ رشد کند." },
                { name: "سارا کریمی", role: "مدیر مارکتینگ جانبی اینجاست", text: "دقت به جزئیات در طراحی UI/UX و تحویل به‌موقع پروژه، از نقاط قوت اصلی وب‌ویژن است. پشتیبانی بعد از تحویل هم بسیار حرفه‌ای و پاسخگو بود." },
                { name: "دکتر یدکی", role: "مدیر آکادمی آموزشی", text: "سیستم اختصاصی که برای آکادمی طراحی شد، دقیقاً همان چیزی بود که نیاز داشتیم. بدون باگ، سریع و با رعایت کامل اصول سئو. کاملاً توصیه می‌کنم." },
