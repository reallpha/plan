const {useState,useRef,useCallback,useEffect}=React;

function CustomCursor(){
const[pos,setPos]=useState({x:-100,y:-100});
const[follower,setFollower]=useState({x:-100,y:-100});
const[isHovered,setIsHovered]=useState(false);
const[isPressed,setIsPressed]=useState(false);
const[isVisible,setIsVisible]=useState(false);

useEffect(()=>{
const isFinePointer=window.matchMedia('(hover: hover) and (pointer: fine)').matches;
if(!isFinePointer)return;
let animId,targetX=-100,targetY=-100;
const handleMouseMove=(e)=>{
targetX=e.clientX;targetY=e.clientY;
setPos({x:targetX,y:targetY});
if(!isVisible)setIsVisible(true);
const t=e.target;if(t){setIsHovered(!!t.closest('a,button,.project-link,.btn,.plan-card,.style-card,.term-item,.cap-item'));}
};
const handleMouseDown=()=>setIsPressed(true);
const handleMouseUp=()=>setIsPressed(false);
const handleMouseLeave=()=>setIsVisible(false);
let currentX=-100,currentY=-100;
const loop=()=>{currentX+=(targetX-currentX)*.2;currentY+=(targetY-currentY)*.2;setFollower({x:currentX,y:currentY});animId=requestAnimationFrame(loop);};
window.addEventListener('mousemove',handleMouseMove);
window.addEventListener('mousedown',handleMouseDown);
window.addEventListener('mouseup',handleMouseUp);
document.addEventListener('mouseleave',handleMouseLeave);
animId=requestAnimationFrame(loop);
return()=>{window.removeEventListener('mousemove',handleMouseMove);window.removeEventListener('mousedown',handleMouseDown);window.removeEventListener('mouseup',handleMouseUp);document.removeEventListener('mouseleave',handleMouseLeave);cancelAnimationFrame(animId);};
},[isVisible]);

if(!isVisible)return null;
return(
<>
<div className={`custom-cursor-ring ${isHovered?'hovered':''} ${isPressed?'pressed':''}`} style={{transform:`translate3d(${follower.x-20}px,${follower.y-20}px,0) scale(${isPressed?.85:isHovered?1.4:1})`}}>
{isHovered&&<span className="cursor-label">VIEW</span>}
</div>
<div className="custom-cursor-dot" style={{transform:`translate3d(${pos.x-5}px,${pos.y-5}px,0)`}}/>
</>
);
}

function Carousel({children,breakpoint=1024,showArrows=true}){
const items=React.Children.toArray(children);
const total=items.length;
const[curr,setCurr]=useState(0);
const[isMobile,setIsMobile]=useState(false);
const isDragging=useRef(false);
const startX=useRef(0);
const currentDragX=useRef(0);
const[dragOffset,setDragOffset]=useState(0);

useEffect(()=>{
const checkMobile=()=>setIsMobile(window.innerWidth<=breakpoint);
checkMobile();
window.addEventListener('resize',checkMobile);
return()=>window.removeEventListener('resize',checkMobile);
},[breakpoint]);

const nextSlide=useCallback(()=>{setCurr(p=>(p+1)%total);setDragOffset(0);},[total]);
const prevSlide=useCallback(()=>{setCurr(p=>(p-1+total)%total);setDragOffset(0);},[total]);
const goTo=useCallback(i=>{setCurr(i);setDragOffset(0);},[]);

const handleTouchStart=e=>{isDragging.current=true;startX.current=e.touches[0].clientX;currentDragX.current=e.touches[0].clientX;};
const handleTouchMove=e=>{if(!isDragging.current)return;currentDragX.current=e.touches[0].clientX;setDragOffset(currentDragX.current-startX.current);};
const handleTouchEnd=()=>{if(!isDragging.current)return;isDragging.current=false;const d=currentDragX.current-startX.current;if(d<-40)nextSlide();else if(d>40)prevSlide();else setDragOffset(0);};
const handleMouseDown=e=>{isDragging.current=true;startX.current=e.clientX;currentDragX.current=e.clientX;};
const handleMouseMove=e=>{if(!isDragging.current)return;currentDragX.current=e.clientX;setDragOffset(currentDragX.current-startX.current);};
const handleMouseUpOrLeave=()=>{if(!isDragging.current)return;isDragging.current=false;const d=currentDragX.current-startX.current;if(d<-40)nextSlide();else if(d>40)prevSlide();else setDragOffset(0);};

if(!isMobile)return <div className="carousel-desktop-grid">{children}</div>;

const translateX=`calc(-${curr*100}% + ${dragOffset}px)`;
return(
<div className="carousel-mobile-stage">
<div className="carousel-track-container" onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd} onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUpOrLeave} onMouseLeave={handleMouseUpOrLeave}>
<div className="carousel-track" style={{transform:`translate3d(${translateX},0,0)`,transition:isDragging.current?'none':'transform 0.38s cubic-bezier(0.25,1,0.5,1)'}}>
{items.map((child,i)=>(<div className="carousel-slide" key={i}><div className="carousel-slide-inner">{child}</div></div>))}
</div>
</div>
{showArrows&&(
<div className="carousel-controls">
<button type="button" className="carousel-btn" onClick={prevSlide} title="قبلی" aria-label="قبلی"><span>قبلی</span><svg fill="none" stroke="currentColor" strokeWidth="2.8" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/></svg></button>
<div className="carousel-counter">{curr+1} / {total}</div>
<button type="button" className="carousel-btn" onClick={nextSlide} title="بعدی" aria-label="بعدی"><svg fill="none" stroke="currentColor" strokeWidth="2.8" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg><span>بعدی</span></button>
</div>
)}
<div className="carousel-dots">
{Array.from({length:total}).map((_,i)=>(<button key={i} type="button" className={`carousel-dot ${i===curr?'active':''}`} onClick={()=>goTo(i)} aria-label={`اسلاید ${i+1}`}/>))}
</div>
</div>
);
}
